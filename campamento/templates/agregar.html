<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Campista - Campamento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(130deg, #eaf5ff 0%, #dff2ff 45%, #c5e9ff 100%);
            min-height: 100vh;
            color: #0c3860;
            font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        }
        .glass-card {
            background: rgba(255,255,255,0.82);
            border: 1px solid rgba(255,255,255,0.68);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 45px rgba(20, 61, 104, 0.18);
            border-radius: 20px;
        }
        .btn-custom {
            border-radius: 14px;
            padding: 12px 24px;
            font-weight: 600;
            transition: all 0.25s ease;
        }
        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.20);
        }
        .form-check-label { cursor: pointer; }
        .btn-agregar { background: #2ec76a; border-color: #27b35f; color: #fff; }
        .btn-volver { background: #667eea; border-color: #5065c1; color: #fff; }
        .glass-card h4 { color: #05416a; }
        @media (max-width: 768px) {
            .container { padding: 1.25rem; }
            .form-control, .form-select { font-size: 0.96rem; }
            .btn-custom { font-size: 0.95rem; }
        }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="glass-card p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-user-plus fa-3x text-primary mb-3"></i>
                    <h2 class="text-primary">Registrar Campista</h2>
                </div>

                <form method="POST" id="campistaForm">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="nombre" class="form-label">
                            <i class="fas fa-user"></i> Nombre Completo
                        </label>
                        <input type="text" name="nombre" id="nombre" class="form-control form-control-lg" placeholder="Ingresa el nombre completo" required>
                    </div>

                    <div class="mb-3">
                        <label for="telefono" class="form-label">
                            <i class="fas fa-phone"></i> Teléfono
                        </label>
                        <input type="text" name="telefono" id="telefono" class="form-control form-control-lg" placeholder="Ingresa el número de teléfono" required>
                    </div>

                    <div class="mb-3">
                        <div class="form-check">
                            <input type="checkbox" name="quiere_camisa" id="quiere_camisa" class="form-check-input">
                            <label class="form-check-label" for="quiere_camisa">
                                <i class="fas fa-tshirt"></i> ¿Quiere camisa del campamento?
                            </label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="talla_camisa" class="form-label">
                            <i class="fas fa-tag"></i> Talla de Camisa
                        </label>
                        <select name="talla_camisa" id="talla_camisa" class="form-select form-select-lg">
                            <option value="">Seleccione talla</option>
                            <option value="4">4</option>
                            <option value="6">6</option>
                            <option value="8">8</option>
                            <option value="10">10</option>
                            <option value="12">12</option>
                            <option value="14">14</option>
                            <option value="16">16</option>
                            <option value="18">18</option>
                            <option value="XS">XS</option>
                            <option value="S">S</option>
                            <option value="M">M</option>
                            <option value="L">L</option>
                            <option value="XL">XL</option>
                        </select>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-agregar btn-custom btn-lg">
                            <i class="fas fa-plus-circle"></i> Agregar Campista
                        </button>
                        <a href="{% url 'lista_campistas' %}" class="btn btn-volver btn-custom">
                            <i class="fas fa-arrow-left"></i> Volver a Lista
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('quiere_camisa').addEventListener('change', function() {
    const tallaSelect = document.getElementById('talla_camisa');
    if (this.checked) {
        tallaSelect.required = true;
        tallaSelect.parentElement.style.display = 'block';
    } else {
        tallaSelect.required = false;
        tallaSelect.value = '';
        tallaSelect.parentElement.style.display = 'none';
    }
});

// Inicializar estado
document.getElementById('quiere_camisa').dispatchEvent(new Event('change'));

document.getElementById('campistaForm').addEventListener('submit', function(e) {
    const nombre = document.getElementById('nombre').value.trim();
    const telefono = document.getElementById('telefono').value.trim();
    const quiereCamisa = document.getElementById('quiere_camisa').checked;
    const talla = document.getElementById('talla_camisa').value;

    if (!nombre) {
        alert('Por favor, ingresa el nombre del campista.');
        e.preventDefault();
        return;
    }

    if (!telefono) {
        alert('Por favor, ingresa el teléfono del campista.');
        e.preventDefault();
        return;
    }

    if (quiereCamisa && !talla) {
        alert('Por favor, selecciona la talla de la camisa.');
        e.preventDefault();
        return;
    }

    if (confirm(`¿Confirmar registro de ${nombre}?`)) {
        // Submit form
    } else {
        e.preventDefault();
    }
});
</script>
</body>
</html>
</html>
